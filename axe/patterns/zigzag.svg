<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" preserveAspectRatio="xMidYMid slice">
  <rect width="240" height="240" fill="#2D4A2D"></rect>
  <defs>
    <pattern id="zigzag" x="0" y="0" width="20" height="12" patternUnits="userSpaceOnUse">
      <polyline points="0,12 10,0 20,12" fill="none" stroke="#4A7C59" stroke-width="1.5" opacity="0.8"></polyline>
      <polyline points="0,6 10,18 20,6" fill="none" stroke="#D4A017" stroke-width="0.8" opacity="0.5"></polyline>
    </pattern>
  </defs>
  <rect width="240" height="240" fill="url(#zigzag)"></rect>
</svg>